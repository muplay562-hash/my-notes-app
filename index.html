<!DOCTYPE html>
<html>
<head>
    <title>Multi-Note App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #f4f4f4;
            padding: 10px;
            overflow-y: auto;
            border-right: 1px solid #ccc;
        }

        .sidebar h2 {
            text-align: center;
        }

        .note-item {
            padding: 8px;
            background: white;
            margin-bottom: 5px;
            cursor: pointer;
            border-radius: 5px;
        }

        .note-item:hover {
            background: #ddd;
        }

        .active {
            background: #4CAF50;
            color: white;
        }

        .main {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        textarea {
            flex: 1;
            resize: none;
            padding: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 10px;
            padding: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Folders</h2>
    <button onclick="createFolder()">+ New Folder</button>
    <div id="foldersList"></div>

    <h2>Notes</h2>
    <button onclick="createNote()">+ New Note</button>
    <div id="notesList"></div>
</div>

<div class="main">
    <input id="titleInput" placeholder="Note Title" style="padding:8px; font-size:16px; margin-bottom:10px;">
    <textarea id="editor" placeholder="Select or create a note..."></textarea>
    <button onclick="deleteNote()">Delete Note</button>
</div>

<script>
    let notes = JSON.parse(localStorage.getItem("notes")) || [];
    let currentNoteIndex = null;

    const notesList = document.getElementById("notesList");
    const editor = document.getElementById("editor");
    const titleInput = document.getElementById("titleInput");

    function saveNotes() {
        localStorage.setItem("notes", JSON.stringify(notes));
    }

    function renderNotes() {
        notesList.innerHTML = "";
        notes.forEach((note, index) => {
            const div = document.createElement("div");
            div.className = "note-item" + (index === currentNoteIndex ? " active" : "");
            div.textContent = note.title || "Untitled Note";
            div.onclick = () => selectNote(index);
            notesList.appendChild(div);
        });
    }

    function createNote() {
        const newNote = {
            title: "New Note",
            content: ""
        };
        notes.push(newNote);
        currentNoteIndex = notes.length - 1;
        saveNotes();
        renderNotes();
        titleInput.value = newNote.title;
        editor.value = "";
    }

    function selectNote(index) {
        currentNoteIndex = index;
        titleInput.value = notes[index].title;
        editor.value = notes[index].content;
        renderNotes();
    }

    function deleteNote() {
        if (currentNoteIndex === null) return;
        notes.splice(currentNoteIndex, 1);
        currentNoteIndex = null;
        titleInput.value = "";
        editor.value = "";
        saveNotes();
        renderNotes();
    }

    titleInput.addEventListener("input", () => {
        if (currentNoteIndex !== null) {
            notes[currentNoteIndex].title = titleInput.value;
            saveNotes();
            renderNotes();
        }
    });

    editor.addEventListener("input", () => {
        if (currentNoteIndex !== null) {
            notes[currentNoteIndex].content = editor.value;
            saveNotes();
        }
    });

    renderNotes();
</script>
</body>
</html>
