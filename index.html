<!DOCTYPE html>
<html>
<head>
    <title>Multi-Note App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #f4f4f4;
            padding: 10px;
            overflow-y: auto;
            border-right: 1px solid #ccc;
        }

        .sidebar h2 {
            text-align: center;
        }

        .note-item {
            padding: 8px;
            background: white;
            margin-bottom: 5px;
            cursor: pointer;
            border-radius: 5px;
        }

        .note-item:hover {
            background: #ddd;
        }

        .active {
            background: #4CAF50;
            color: white;
        }

        .main {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        textarea {
            flex: 1;
            resize: none;
            padding: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 10px;
            padding: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Folders</h2>
    <button onclick="createFolder()">+ New Folder</button>
    <button onclick="renameFolder()">Rename Folder</button>
    <button onclick="deleteFolder()">Delete Folder</button>
    <div id="foldersList"></div>

    <h2>Notes</h2>
    <button onclick="createNote()">+ New Note</button>
    <div id="notesList"></div>
</div>

<div class="main">
    <input id="titleInput" placeholder="Note Title" style="padding:8px; font-size:16px; margin-bottom:10px;">
    <textarea id="editor" placeholder="Select or create a note..."></textarea>
    <button onclick="deleteNote()">Delete Note</button>
</div>

<script>
let folders = JSON.parse(localStorage.getItem("folders")) || [];
let currentFolderIndex = null;
let currentNoteIndex = null;

const foldersList = document.getElementById("foldersList");
const notesList = document.getElementById("notesList");
const editor = document.getElementById("editor");
const titleInput = document.getElementById("titleInput");

function saveData() {
    localStorage.setItem("folders", JSON.stringify(folders));
}

// ===== Folder Functions =====
function renderFolders() {
    foldersList.innerHTML = "";
    folders.forEach((folder, index) => {
        const div = document.createElement("div");
        div.className = "note-item" + (index === currentFolderIndex ? " active" : "");
        div.textContent = folder.name || "Untitled Folder";
        div.onclick = () => selectFolder(index);
        foldersList.appendChild(div);
    });
}

function createFolder() {
    const name = prompt("Folder name:");
    if (!name) return;
    folders.push({ name, notes: [] });
    currentFolderIndex = folders.length - 1;
    currentNoteIndex = null;
    saveData();
    renderFolders();
    renderNotes();
}

function selectFolder(index) {
    currentFolderIndex = index;
    currentNoteIndex = null;
    renderFolders();
    renderNotes();
}

function renameFolder() {
    if (currentFolderIndex === null) {
        alert("Select a folder first!");
        return;
    }
    const newName = prompt("Enter new folder name:", folders[currentFolderIndex].name);
    if (!newName) return;
    folders[currentFolderIndex].name = newName;
    saveData();
    renderFolders();
}

// ===== Note Functions =====
function renderNotes() {
    notesList.innerHTML = "";
    if (currentFolderIndex === null) return;
    folders[currentFolderIndex].notes.forEach((note, index) => {
        const div = document.createElement("div");
        div.className = "note-item" + (index === currentNoteIndex ? " active" : "");
        div.textContent = note.title || "Untitled Note";
        div.onclick = () => selectNote(index);
        notesList.appendChild(div);
    });
}

function createNote() {
    if (currentFolderIndex === null) {
        alert("Select a folder first!");
        return;
    }
    const newNote = { title: "New Note", content: "" };
    folders[currentFolderIndex].notes.push(newNote);
    currentNoteIndex = folders[currentFolderIndex].notes.length - 1;
    saveData();
    renderNotes();
    titleInput.value = newNote.title;
    editor.value = "";
}

function selectNote(index) {
    if (currentFolderIndex === null) return;
    currentNoteIndex = index;
    const note = folders[currentFolderIndex].notes[index];
    titleInput.value = note.title;
    editor.value = note.content;
    renderNotes();
}

function deleteNote() {
    if (currentFolderIndex === null || currentNoteIndex === null) return;
    folders[currentFolderIndex].notes.splice(currentNoteIndex, 1);
    currentNoteIndex = null;
    titleInput.value = "";
    editor.value = "";
    saveData();
    renderNotes();
}

// ===== Input Event Listeners =====
titleInput.addEventListener("input", () => {
    if (currentFolderIndex === null || currentNoteIndex === null) return;
    folders[currentFolderIndex].notes[currentNoteIndex].title = titleInput.value;
    saveData();
    renderNotes();
});

editor.addEventListener("input", () => {
    if (currentFolderIndex === null || currentNoteIndex === null) return;
    folders[currentFolderIndex].notes[currentNoteIndex].content = editor.value;
    saveData();
});

// ===== Initial Render =====
renderFolders();
renderNotes();
</script>
</body>
</html>
